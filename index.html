<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Forecasting - Narzędzia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .tool-tile {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .tool-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .tool-tile h2 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .tool-tile p {
            color: #7f8c8d;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Delivery Forecasting - Narzędzia</h1>
    </header>

    <div class="container">
        <div class="tools-grid">
            <a href="sprint-planning.html" class="tool-tile">
                <h2>Planowanie Sprintu</h2>
                <p>Narzędzie do planowania i prognozowania sprintów</p>
            </a>

            <a href="PrzedzialyNPS.html" class="tool-tile">
                <h2>Przedziały Ufności NPS</h2>
                <p>Kalkulacja przedziałów ufności dla wyników NPS</p>
            </a>
        </div>
    </div>
</body>
</html>
