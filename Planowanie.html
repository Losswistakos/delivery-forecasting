<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planowanie Sprintu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 500;
        }

        .back-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background-color: #34495e;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .back-link:hover {
            background-color: #465a6e;
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background-color: #34495e;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        td.numeric {
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        td.center {
            text-align: center;
        }

        .add-sprint-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .add-sprint-btn:hover {
            background-color: #229954;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            animation: slideDown 0.3s;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }

        .modal-header h2 {
            font-size: 22px;
            color: #2c3e50;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close:hover {
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group label.required::after {
            content: " *";
            color: #e74c3c;
        }

        .form-group input[type="number"],
        .form-group input[type="date"],
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-group input.error {
            border-color: #e74c3c;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0 !important;
            cursor: pointer;
            user-select: none;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 16px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.success {
            background-color: #d4edda;
            color: #155724;
        }

        .status-badge.failure {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <header>
        <h1>Planowanie Sprintu</h1>
        <a href="index.html" class="back-link">← Powrót</a>
    </header>

    <div class="container">
        <!-- Sprint Data Section -->
        <div class="section">
            <h2>Dane dot. sprintów</h2>
            <button class="add-sprint-btn" onclick="openModal()">
                <span style="font-size: 20px;">+</span>
                <span>Dodaj sprint</span>
            </button>
            <div class="table-container">
                <table id="sprints-table">
                    <thead>
                        <tr>
                            <th>Numer Sprintu</th>
                            <th>Data Rozpoczęcia</th>
                            <th>Data Zakończenia</th>
                            <th>Kwartał</th>
                            <th class="numeric">Planowane SP</th>
                            <th class="numeric">Ukończone SP</th>
                            <th class="center">Cel Spełniony</th>
                            <th class="center">Nie Uwzględniaj</th>
                        </tr>
                    </thead>
                    <tbody id="sprints-tbody">
                        <tr>
                            <td colspan="8" class="no-data">Ładowanie danych...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Sprint Modal -->
    <div id="addSprintModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Dodaj nowy sprint</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            
            <form id="sprintForm">
                <div class="form-group">
                    <label for="numerSprintu" class="required">Numer sprintu</label>
                    <input type="number" id="numerSprintu" name="numerSprintu" min="1" required>
                    <div class="error-message" id="numerSprintu-error">To pole jest wymagane</div>
                </div>

                <div class="form-group">
                    <label for="dataRozpoczecia" class="required">Data rozpoczęcia</label>
                    <input type="date" id="dataRozpoczecia" name="dataRozpoczecia" required>
                    <div class="error-message" id="dataRozpoczecia-error">To pole jest wymagane</div>
                </div>

                <div class="form-group">
                    <label for="dataZakonczenia">Data zakończenia</label>
                    <input type="date" id="dataZakonczenia" name="dataZakonczenia">
                </div>

                <div class="form-group">
                    <label for="kwartal" class="required">Kwartał</label>
                    <input type="text" id="kwartal" name="kwartal" placeholder="np. Q1 2025" required>
                    <div class="error-message" id="kwartal-error">To pole jest wymagane</div>
                </div>

                <div class="form-group">
                    <label for="liczbaPlanowanychSP">Liczba planowanych story points</label>
                    <input type="number" id="liczbaPlanowanychSP" name="liczbaPlanowanychSP" min="0">
                </div>

                <div class="form-group">
                    <label for="liczbaUkonczonychSP" class="required">Liczba ukończonych story points</label>
                    <input type="number" id="liczbaUkonczonychSP" name="liczbaUkonczonychSP" min="0" required>
                    <div class="error-message" id="liczbaUkonczonychSP-error">To pole jest wymagane</div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="celSpelniony" name="celSpelniony">
                        <label for="celSpelniony">Czy cel spełniony</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="nieUwzgledniaj" name="nieUwzgledniaj">
                        <label for="nieUwzgledniaj">Nie uwzględniaj</label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Anuluj</button>
                    <button type="submit" class="btn btn-primary">Zapisz</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let sprintsData = { sprints: [] };

        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadSprintsData();
            
            // Auto-calculate end date when start date changes
            document.getElementById('dataRozpoczecia').addEventListener('change', function() {
                autoFillEndDate();
            });

            // Form submission
            document.getElementById('sprintForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveSprint();
            });
        });

        // Load sprints data from JSON file
        async function loadSprintsData() {
            try {
                const response = await fetch('Planowanie_dane.json');
                sprintsData = await response.json();
                displaySprints();
            } catch (error) {
                console.error('Error loading sprints data:', error);
                document.getElementById('sprints-tbody').innerHTML = 
                    '<tr><td colspan="8" class="no-data">Błąd podczas ładowania danych</td></tr>';
            }
        }

        // Display sprints in table
        function displaySprints() {
            const tbody = document.getElementById('sprints-tbody');
            
            if (!sprintsData.sprints || sprintsData.sprints.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-data">Brak danych do wyświetlenia</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            sprintsData.sprints.forEach(sprint => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${sprint.numerSprintu}</td>
                    <td>${formatDate(sprint.dataRozpoczecia)}</td>
                    <td>${formatDate(sprint.dataZakonczenia)}</td>
                    <td>${sprint.kwartal}</td>
                    <td class="numeric">${sprint.liczbaPlanowanychSP || '-'}</td>
                    <td class="numeric">${sprint.liczbaUkonczonychSP}</td>
                    <td class="center">
                        <span class="status-badge ${sprint.celSpelniony ? 'success' : 'failure'}">
                            ${sprint.celSpelniony ? 'Tak' : 'Nie'}
                        </span>
                    </td>
                    <td class="center">${sprint.nieUwzgledniaj ? 'Tak' : 'Nie'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Format date to Polish format (DD.MM.YYYY)
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }

        // Auto-fill end date (2 weeks from start date)
        function autoFillEndDate() {
            const startDateInput = document.getElementById('dataRozpoczecia');
            const endDateInput = document.getElementById('dataZakonczenia');
            
            if (startDateInput.value) {
                const startDate = new Date(startDateInput.value);
                const endDate = new Date(startDate);
                endDate.setDate(endDate.getDate() + 14); // Add 14 days
                
                // Format date as YYYY-MM-DD for input
                const formattedDate = endDate.toISOString().split('T')[0];
                endDateInput.value = formattedDate;
            }
        }

        // Open modal
        function openModal() {
            document.getElementById('addSprintModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Prevent body scroll when modal is open
        }

        // Close modal
        function closeModal() {
            document.getElementById('addSprintModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            resetForm();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('addSprintModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Reset form
        function resetForm() {
            document.getElementById('sprintForm').reset();
            // Hide all error messages
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
            });
            // Remove error classes
            document.querySelectorAll('.error').forEach(el => {
                el.classList.remove('error');
            });
        }

        // Validate form
        function validateForm() {
            let isValid = true;
            const requiredFields = ['numerSprintu', 'dataRozpoczecia', 'kwartal', 'liczbaUkonczonychSP'];
            
            requiredFields.forEach(fieldId => {
                const field = document.getElementById(fieldId);
                const errorMsg = document.getElementById(fieldId + '-error');
                
                if (!field.value || field.value.trim() === '') {
                    field.classList.add('error');
                    if (errorMsg) errorMsg.style.display = 'block';
                    isValid = false;
                } else {
                    field.classList.remove('error');
                    if (errorMsg) errorMsg.style.display = 'none';
                }
            });
            
            return isValid;
        }

        // Save sprint
        function saveSprint() {
            if (!validateForm()) {
                return;
            }

            const formData = {
                numerSprintu: parseInt(document.getElementById('numerSprintu').value),
                dataRozpoczecia: document.getElementById('dataRozpoczecia').value,
                dataZakonczenia: document.getElementById('dataZakonczenia').value || null,
                kwartal: document.getElementById('kwartal').value,
                liczbaPlanowanychSP: document.getElementById('liczbaPlanowanychSP').value ? 
                    parseInt(document.getElementById('liczbaPlanowanychSP').value) : null,
                liczbaUkonczonychSP: parseInt(document.getElementById('liczbaUkonczonychSP').value),
                celSpelniony: document.getElementById('celSpelniony').checked,
                nieUwzgledniaj: document.getElementById('nieUwzgledniaj').checked
            };

            // Add new sprint to data
            sprintsData.sprints.push(formData);
            
            // Sort by sprint number
            sprintsData.sprints.sort((a, b) => a.numerSprintu - b.numerSprintu);

            // Note: In a real application, you would save to a backend server here
            // For this demo, we'll save to localStorage and update the display
            localStorage.setItem('sprintsData', JSON.stringify(sprintsData));
            
            // Refresh the table
            displaySprints();
            
            // Close modal
            closeModal();
            
            // Show success message (optional)
            alert('Sprint został pomyślnie dodany!');
        }

        // Check if there's data in localStorage on load
        window.addEventListener('DOMContentLoaded', function() {
            const savedData = localStorage.getItem('sprintsData');
            if (savedData) {
                sprintsData = JSON.parse(savedData);
                displaySprints();
            }
        });
    </script>
</body>
</html>
